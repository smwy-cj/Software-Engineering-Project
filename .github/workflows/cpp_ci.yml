name: CampusHub Cross-Platform CI

on:
  push:
    branches: [ "main","smwy-cj-patch-1"]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    # 核心修改：使用矩阵策略同时在两个环境下运行
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
      # 即使一个平台失败，另一个也继续尝试完成
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. 环境准备：根据不同系统安装构建工具
      - name: Install Dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake

      # # 2. 跨平台编译：使用 CMake 统一构建逻辑
      # - name: Configure and Build
      #   run: |
      #     cmake -B build
      #     cmake --build build --config Release

      # # 3. 自动化测试（集成 Postman 选型）
      # - name: Run API Tests (Newman)
      #   # 落实团队选用的 Postman AI 方案
      #   run: |
      #     echo "正在 ${{ matrix.os }} 环境下执行接口测试..."
      #     # 注意：在 Windows 上运行命令时，GitHub Actions 会自动切换为 PowerShell
      #     # 如果已将 Postman 测试脚本导出为 json，可在此运行：
      #     # npx newman run ./tests/campus_hub_api.json

      - name: Skip Build Step
        run: |
          echo "由于尚未添加 CMakeLists.txt，暂时跳过编译步骤。"
          echo "当前仅进行环境检查。"
